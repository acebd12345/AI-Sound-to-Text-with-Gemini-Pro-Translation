<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能轉錄翻譯 (Pro)</title>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --bg: #f3f4f6; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #1f2937; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #111827; }
        
        /* Upload Section */
        .upload-area { border: 2px dashed #e5e7eb; padding: 3rem; text-align: center; border-radius: 0.75rem; cursor: pointer; transition: 0.2s; position: relative; }
        .upload-area:hover { border-color: var(--primary); background: #f9fafb; }
        input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-block; margin-top: 1rem; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn.download { background: var(--success); text-decoration: none; font-size: 0.875rem; padding: 0.5rem 1rem; }

        /* History Section */
        .history-section { margin-top: 3rem; border-top: 1px solid #e5e7eb; padding-top: 2rem; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .history-table th, .history-table td { text-align: left; padding: 1rem; border-bottom: 1px solid #f3f4f6; }
        .history-table th { color: #6b7280; font-weight: 600; font-size: 0.875rem; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .status-processing { background: #e0e7ff; color: #4338ca; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 語音轉錄 + 翻譯 (Pro版)</h1>
        <p style="color: #6b7280;">支援長錄音、斷點續傳、背景執行。上傳後可關閉視窗，稍後回來查看結果。</p>

        <!-- Mode Selection -->
        <div style="margin-bottom: 1.5rem; text-align: left;">
            <label style="font-weight: 600; color: #374151; display: block; margin-bottom: 0.5rem;">處理模式：</label>
            <select id="processMode" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #d1d5db; background: white; font-size: 1rem; margin-bottom: 1rem;">
                <option value="speech">🗣️ 一般對話 / 會議 (自動過濾靜音)</option>
                <option value="song">🎵 歌曲 / 歌詞 (保留人聲細節)</option>
            </select>
            
            <label style="display: flex; align-items: center; cursor: pointer; color: #374151; font-weight: 600;">
                <input type="checkbox" id="diarizeToggle" onchange="toggleKnownNames()" style="width: 1.2rem; height: 1.2rem; margin-right: 0.5rem; accent-color: var(--primary);">
                分辨講者 (Speaker Diarization)
            </label>
            <div id="knownNamesSection" style="display: none; margin-top: 0.75rem; margin-left: 1.7rem;">
                <label style="font-weight: 600; color: #374151; display: block; margin-bottom: 0.25rem; font-size: 0.9rem;">已知人名（供 AI 參考）：</label>
                <input type="text" id="knownNamesInput" placeholder="例：王小明, 李大華, 張經理" style="width: 100%; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1px solid #d1d5db; font-size: 0.9rem; box-sizing: border-box;">
                <div style="font-size: 0.75rem; color: #9ca3af; margin-top: 0.25rem;">以逗號分隔多個人名，AI 會嘗試用這些名字標注講者</div>
            </div>
        </div>

        <div class="upload-area">
            <input type="file" id="fileInput" onchange="handleFileSelect(this)" accept="audio/*,video/*,.mp3,.wav,.m4a,.mp4,.mov,.wma,.aac">
            <div id="uploadText">
                <div style="font-size: 2rem; margin-bottom: 1rem; color: var(--primary);">+</div>
                <div>點擊或拖曳檔案至此</div>
                <div id="selectedFileName" style="color: var(--primary); margin-top: 0.5rem; font-weight: 600;"></div>
            </div>
        </div>
        <button id="startBtn" onclick="startUpload()" class="btn" style="width: 100%; display: none;">開始上傳與處理</button>
        <div id="uploadProgress" style="margin-top: 1rem; color: #6b7280;"></div>

        <div class="history-section">
            <h2>處理紀錄</h2>
            <button onclick="clearHistory()" style="float: right; font-size: 0.8rem; background: none; border: none; color: #ef4444; cursor: pointer;">清除紀錄</button>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>檔案名稱</th>
                        <th>提交時間</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="historyList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "";
        const CHUNK_SIZE = 25 * 1024 * 1024;

        // HTML escape 防止 XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 帶重試的 fetch（最多重試 3 次，間隔遞增）
        async function fetchWithRetry(url, options, maxRetries = 3) {
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const res = await fetch(url, options);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res;
                } catch (e) {
                    if (attempt === maxRetries) throw e;
                    const delay = attempt * 2000;
                    console.warn(`第 ${attempt} 次上傳失敗，${delay/1000}s 後重試...`, e);
                    await new Promise(r => setTimeout(r, delay));
                }
            }
        }
        
        function toggleKnownNames() {
            document.getElementById('knownNamesSection').style.display =
                document.getElementById('diarizeToggle').checked ? 'block' : 'none';
        }

        // 初始化載入紀錄
        document.addEventListener('DOMContentLoaded', loadHistory);

        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) {
                // 簡單的格式檢查
                const validExtensions = ['.mp3', '.wav', '.m4a', '.mp4', '.mov', '.wma', '.aac', '.flac', '.ogg'];
                const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
                
                if (!file.type.startsWith('audio/') && !file.type.startsWith('video/') && !validExtensions.includes(ext)) {
                    alert("不支援的檔案格式！請上傳音訊或影片檔。");
                    input.value = ''; // 清空
                    document.getElementById('selectedFileName').innerText = "";
                    document.getElementById('startBtn').style.display = 'none';
                    return;
                }

                document.getElementById('selectedFileName').innerText = file.name;
                document.getElementById('startBtn').style.display = 'inline-block';
            }
        }

        async function startUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("請先選擇檔案！");

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "上傳中...";

            const randomSuffix = Math.random().toString(36).substring(2, 8);
            const fileId = `${Date.now()}_${randomSuffix}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '')}`;
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            const mode = document.getElementById('processMode').value;

            // 加入紀錄
            addHistoryItem(fileId, file.name, totalChunks);

            try {
                for (let i = 0; i < totalChunks; i++) {
                    document.getElementById('uploadProgress').innerText = `正在上傳第 ${i+1}/${totalChunks} 部分...`;
                    const chunk = file.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
                    const fd = new FormData();
                    fd.append("file_chunk", chunk);
                    fd.append("chunk_index", i);
                    fd.append("total_chunks", totalChunks);
                    fd.append("file_id", fileId);
                    fd.append("mode", mode); // 傳送模式參數
                    fd.append("diarize", document.getElementById('diarizeToggle').checked); // 傳送區分講者設定
                    const knownNames = document.getElementById('knownNamesInput').value.trim();
                    if (knownNames) fd.append("known_names", knownNames);

                    await fetchWithRetry(`${API_URL}/upload_chunk`, { method: "POST", body: fd });
                }
                
                document.getElementById('uploadProgress').innerText = "上傳完成！已加入背景處理佇列。";
                btn.innerText = "開始上傳與處理";
                btn.disabled = false;
                
                // 開始輪詢 (觸發一次狀態檢查)
                checkTaskStatus(fileId, totalChunks);

            } catch (e) {
                console.error(e);
                alert("上傳失敗");
                btn.disabled = false;
            }
        }

        // --- History & Polling Logic ---

        function getHistory() {
            return JSON.parse(localStorage.getItem('stt_history') || '[]');
        }

        function saveHistory(history) {
            localStorage.setItem('stt_history', JSON.stringify(history));
            renderHistory();
        }

        function addHistoryItem(id, name, chunks) {
            const history = getHistory();
            history.unshift({
                id: id,
                name: name,
                chunks: chunks,
                date: new Date().toLocaleString(),
                status: 'processing', // processing, completed
                text: null,
                plainText: null
            });
            saveHistory(history);
            checkTaskStatus(id, chunks); // Start polling this new task
        }

        function updateHistoryItem(id, updates) {
            const history = getHistory();
            const index = history.findIndex(h => h.id === id);
            if (index !== -1) {
                history[index] = { ...history[index], ...updates };
                saveHistory(history);
            }
        }

        function deleteHistoryItem(id) {
            const history = getHistory();
            const newHistory = history.filter(h => h.id !== id);
            saveHistory(newHistory);
        }
        
        function clearHistory() {
            if(confirm('確定清空所有紀錄？')) {
                localStorage.removeItem('stt_history');
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const history = getHistory();
            list.innerHTML = '';

            history.forEach(item => {
                const tr = document.createElement('tr');
                let statusBadge = `<span class="status-badge status-processing">處理中...</span>`;
                if (item.status === 'completed') {
                    statusBadge = `<span class="status-badge status-completed">完成</span>`;
                } else if (item.status === 'error') {
                    statusBadge = `<span class="status-badge status-error">失敗</span>`;
                }

                const safeId = escapeHtml(item.id);
                const safeName = escapeHtml(item.name);
                const safeDate = escapeHtml(item.date);

                tr.innerHTML = `
                    <td>${safeName}</td>
                    <td style="font-size: 0.8rem; color: #666;">${safeDate}</td>
                    <td>${statusBadge} <div id="status-${safeId}" style="font-size: 0.7rem; color: #888;"></div></td>
                    <td>
                        ${item.status === 'completed' ? `<button class="btn download" onclick="downloadResult('${safeId}')">下載 SRT</button> <button class="btn download" onclick="downloadPlainText('${safeId}')">下載純文字</button>` : ''}
                        <button onclick="deleteHistoryItem('${safeId}')" style="margin-left: 0.5rem; border:none; background:none; cursor:pointer; color: #991b1b;">刪除</button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        const MAX_POLL_ATTEMPTS = 720; // 最多輪詢 720 次 (約 1 小時)
        const pollCounts = {};

        async function checkTaskStatus(fileId, totalChunks) {
            pollCounts[fileId] = (pollCounts[fileId] || 0) + 1;

            if (pollCounts[fileId] > MAX_POLL_ATTEMPTS) {
                console.warn(`[${fileId}] 已超過最大輪詢次數，停止輪詢`);
                updateHistoryItem(fileId, { status: 'error' });
                delete pollCounts[fileId];
                return;
            }

            const statusDiv = document.getElementById(`status-${fileId}`);

            try {
                const res = await fetch(`${API_URL}/check_status/${fileId}?total_chunks=${totalChunks}`);
                const data = await res.json();

                if (data.status === "completed") {
                    updateHistoryItem(fileId, { status: 'completed', text: data.srt_text, plainText: data.plain_text });
                    delete pollCounts[fileId];
                } else {
                    if (statusDiv) statusDiv.innerText = data.progress || '';
                    setTimeout(() => checkTaskStatus(fileId, totalChunks), 5000);
                }
            } catch (e) {
                console.error("Polling error", e);
                setTimeout(() => checkTaskStatus(fileId, totalChunks), 10000);
            }
        }

        function downloadResult(id) {
            const history = getHistory();
            const item = history.find(h => h.id === id);
            if (item && item.text) {
                const blob = new Blob([item.text], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.srt`;
                a.click();
                // 釋放記憶體，避免 Object URL 洩漏
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }
        }

        function downloadPlainText(id) {
            const history = getHistory();
            const item = history.find(h => h.id === id);
            if (item && item.plainText) {
                const blob = new Blob([item.plainText], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${item.name}.txt`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }
        }

        function loadHistory() {
            renderHistory();
            // Restart polling for incomplete tasks
            const history = getHistory();
            history.forEach(item => {
                if (item.status === 'processing') {
                    checkTaskStatus(item.id, item.chunks);
                }
            });
        }
    </script>
</body>
</html>
